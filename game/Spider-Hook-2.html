        <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Start UI</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #ffd84d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
}

/* MENU */
.container {
  text-align: center;
}

.btn {
  width: 320px;
  max-width: 90%;
  padding: 18px;
  border-radius: 20px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  cursor: pointer;
  margin: 15px 0;
}

.play-btn {
  background: linear-gradient(45deg,#5f3bff,#7a5cff);
  color: white;
}

.secondary-btn {
  background: #fff3b0;
  color: #5f3bff;
}

/* GAME AREA */
.game-wrapper {
  position: fixed;
  inset: 0;
  display: none;
  background: black;
  overflow: hidden;
}

/* RESPONSIVE IFRAME */
.game-wrapper iframe {
  width: 100vw;
  height: 100vh;
  border: none;
  display: block;
}

/* FULLSCREEN BUTTON */
.fullscreen-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
}

/* MOBILE FIXES */
@media (max-width: 768px) {
  .btn {
    font-size: 16px;
    padding: 16px;
  }

  .fullscreen-btn {
    top: 10px;
    right: 10px;
    padding: 8px 12px;
  }
}
</style>
</head>

<body>

<div class="container" id="menu">
  <button class="btn play-btn" onclick="startGame()">PLAY GAME</button>
  <br>
  <button class="btn secondary-btn" onclick="goTrending()">PLAY AT CLASSROOM 4X</button>
</div>

<div class="game-wrapper" id="gameWrapper">
  <button class="fullscreen-btn" onclick="openFullscreenTab()">⛶ Fullscreen</button>
  <iframe id="gameFrame" allowfullscreen></iframe>
</div>

<script>

const GAME_URL = "https://yandex.com/games/dist-app/515671?utm_source=distrib&utm_medium=vakhtangi-jibladze&clid=14759072";

/* PLAY GAME */
function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameWrapper").style.display = "block";
  document.getElementById("gameFrame").src = GAME_URL;
}

/* FULLSCREEN ახალ ტაბში */
function openFullscreenTab() {
  const win = window.open("about:blank", "_blank");

  win.document.write(`
  <html>
  <head>
    <title>Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      html,body {
        margin:0;
        height:100%;
        background:black;
        overflow:hidden;
      }
      iframe {
        width:100vw;
        height:100vh;
        border:none;
      }
    </style>
  </head>
  <body>
    <iframe src="${GAME_URL}" allowfullscreen></iframe>
  </body>
  </html>
  `);
}

/* REDIRECT */
function goTrending() {
  window.open("https://classroom4x.dev/category/new-games/", "_blank");
}

</script>

</body>
